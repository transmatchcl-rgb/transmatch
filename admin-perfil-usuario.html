<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TransMatch — Perfil usuario</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;background:#f5f7fb;color:#374151}
  #app{display:none}
  #auth-guard{position:fixed;inset:0;background:#1e2d4e;display:flex;align-items:center;justify-content:center;z-index:9999}
  .gs{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .nav{background:#1e2d4e;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .nav-left{display:flex;align-items:center;gap:16px}
  .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .brand-logo{height:30px;width:auto;display:block}
  .nav-icon{background:#FF8808;border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px}
  .nav-name{font-weight:700;color:#fff;font-size:15px}.nav-name span{color:#FF8808}
  .nav-badge{background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
  .nav-tabs{display:flex;gap:2px}
  .nav-tab{padding:6px 13px;border-radius:6px;font-size:13px;text-decoration:none;color:#93C5FD;white-space:nowrap}
  .nav-tab:hover,.nav-tab.active{color:#fff;background:rgba(255,255,255,.12)}
  .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
  main{max-width:820px;margin:0 auto;padding:28px 20px 60px}
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#9CA3AF;margin-bottom:20px}
  .breadcrumb a{color:#1d4ed8;text-decoration:none}
  .card{background:#fff;border-radius:14px;border:0.5px solid #e8eaf0;box-shadow:0 1px 4px rgba(30,45,78,.06);margin-bottom:16px;overflow:hidden}
  .card-hdr{padding:14px 20px;border-bottom:0.5px solid #e8eaf0;font-size:12px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em}
  .card-body{padding:20px}
  .perfil-hdr{display:flex;align-items:flex-start;gap:16px}
  .perfil-avatar{width:56px;height:56px;border-radius:12px;background:#1e2d4e;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:22px;flex-shrink:0}
  .perfil-nombre{font-size:20px;font-weight:700;color:#1e2d4e;margin-bottom:4px}
  .perfil-email{font-size:14px;color:#6B7280}
  .perfil-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  @media(max-width:560px){.info-grid{grid-template-columns:1fr}}
  .info-item{padding:12px 14px;background:#f8f9fc;border-radius:8px;border:0.5px solid #e8eaf0}
  .info-label{font-size:11px;color:#9CA3AF;font-weight:600;margin-bottom:4px}
  .info-val{font-size:13px;color:#111827;font-weight:500}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:999px}
  .badge-green{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
  .badge-orange{background:#FFF7ED;color:#92400E;border:1px solid #FED7AA}
  .badge-gray{background:#F9FAFB;color:#6B7280;border:1px solid #e8eaf0}
  .badge-red{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
  .badge-pro{background:#EFF6FF;color:#1d4ed8;border:none}
  .badge-enterprise{background:#FFF7ED;color:#c2410c;border:none}
  .plan-select{padding:9px 12px;border:0.5px solid #e8eaf0;border-radius:8px;font-size:13px;background:#fff;color:#374151;min-width:180px}
  .equipo-item{background:#fff;border-radius:12px;border:0.5px solid #e8eaf0;box-shadow:0 2px 8px rgba(30,45,78,.09);margin-bottom:16px;padding:10px 14px;transition:box-shadow .15s,border-color .15s}
  .equipo-item:hover{box-shadow:0 4px 16px rgba(30,45,78,.10);border-color:#c7d0e8}
  .equipo-item:last-child{margin-bottom:0}
  .equipo-tipo{font-size:13px;font-weight:500;color:#1e2d4e}
  .equipo-meta{font-size:12px;color:#6B7280;margin-top:2px}
  .sep{height:0.5px;background:#e8eaf0;margin:16px 0}
  textarea{width:100%;padding:10px 12px;border:0.5px solid #e8eaf0;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:90px;color:#374151}
  textarea:focus{outline:none;border-color:#1e2d4e}
  .licit-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #f3f4f6}
  .licit-row:last-child{border-bottom:none}
  #toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none}
  .spinner{width:24px;height:24px;border:3px solid #e8eaf0;border-top-color:#1e2d4e;border-radius:50%;animation:spin .7s linear infinite;margin:32px auto}
  .empty{text-align:center;padding:24px;color:#9CA3AF;font-size:13px}
  .btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
  .btn:hover{opacity:.85}
  /* TM-MOBILE-FIX */
  @media(max-width:600px){
    [style*="grid-template-columns:1fr 1fr"],
    [style*="grid-template-columns:repeat(2,1fr)"],
    [style*="grid-template-columns:repeat(2, 1fr)"],
    [style*="grid-template-columns:repeat(3,1fr)"],
    [style*="grid-template-columns:repeat(3, 1fr)"]{grid-template-columns:1fr!important}
    body{overflow-x:hidden}
    .nav-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
    .nav-left{min-width:0;overflow:hidden}
  }
</style>
</head>

    <div class="breadcrumb">
      <a href="/admin.html">Dashboard</a>
      <span>/</span>

</div>

<div id="toast"></div>

<script>
  const API = 'https://transmatch.transmatchcl.workers.dev';
  var userData = null;
  var todosUsuarios = [];

  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = type === 'err' ? '#EF4444' : '#1ED24E';
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.style.opacity = '0'; }, 3000);
  }

  async function api(path, method, body) {
    var o = { method: method || 'GET', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('tm_token') } };
    if (body) o.body = JSON.stringify(body);
    var r = await fetch(API + path, o);
    if (r.status === 401) { localStorage.clear(); window.location.replace('/admin-login.html'); return null; }
    return { ok: r.ok, data: await r.json() };
  }

  function planBadge(plan) {
    if (plan === 'enterprise') return '<span class="badge badge-enterprise">Enterprise</span>';
    if (plan === 'pro') return '<span class="badge badge-pro">Pro</span>';
    if (plan === 'basico') return '<span class="badge badge-gray">Básico</span>';
    return '<span class="badge badge-gray">Sin plan</span>';
  }

  function estadoBadge(estado) {
    var m = { activo: 'badge-green', pendiente: 'badge-orange', suspendido: 'badge-red', rechazado: 'badge-red' };
    var l = { activo: 'Activa', pendiente: 'Pendiente', suspendido: 'Suspendida', rechazado: 'Rechazada' };
    return '<span class="badge ' + (m[estado] || 'badge-gray') + '">' + (l[estado] || estado) + '</span>';
  }

  async function cargar() {
    var params = new URLSearchParams(window.location.search);
    var email = params.get('email');
    if (!email) { document.getElementById('contenido').innerHTML = '<div class="empty">Usuario no especificado</div>'; return; }

    var r = await api('/api/admin/usuarios');
    if (!r || !r.ok) { document.getElementById('contenido').innerHTML = '<div class="empty">Error al cargar</div>'; return; }

    userData = (r.data.usuarios || []).find(function(u) { return u.email === email; });
    todosUsuarios = r.data.usuarios || [];
    if (!userData) { document.getElementById('contenido').innerHTML = '<div class="empty">Usuario no encontrado</div>'; return; }

    var isTransportista = userData.role === 'transportista';
    document.getElementById('breadcrumb-back').textContent = isTransportista ? 'Transportistas' : 'Clientes';
    document.getElementById('breadcrumb-back').href = isTransportista ? '/admin-transportistas.html' : '/admin-clientes.html';
    document.getElementById('breadcrumb-nombre').textContent = userData.empresa || userData.nombre;

    renderPerfil(userData, isTransportista);
  }

  function renderPerfil(u, isTransportista) {
    var initials = (u.empresa || u.nombre || '?')[0].toUpperCase();
    var equipos = u.equipos || [];

    // Sección equipos solo para transportistas
    var equiposHtml = '';
    if (isTransportista) {
      var equiposInner = equipos.length === 0
        ? '<div class="empty">Sin equipos registrados</div>'
        : equipos.map(function(e, idx) {
            var docs = e.documentos || {};
            var reqDocs = [
              ['permiso_circulacion','Permiso de circulación'],
              ['revision_tecnica','Revisión técnica'],
              ['gases','Certificado de gases'],
              ['seguro_obligatorio','Seguro obligatorio (SOAP)'],
              ['poliza_empresa','Póliza de la empresa']
            ];
            var subidos = reqDocs.filter(function(d){ return docs[d[0]] && docs[d[0]].archivoId; }).length;
            var completo = subidos >= reqDocs.length;
            var pillBg = completo ? '#DCFCE7' : '#FEF3C7';
            var pillColor = completo ? '#14532D' : '#92400E';
            var specs = [];
            if(e.capacidadMax||e.capacidad) specs.push('Cap: '+(e.capacidadMax||e.capacidad)+' ton');
            if(e.largoMax) specs.push('Largo: '+e.largoMax+'m');
            if(e.anchoMax) specs.push('Ancho: '+e.anchoMax+'m');
            if(e.altoMax) specs.push('Alto: '+e.altoMax+'m');
            // Documentos del equipo
            var docsHtml = reqDocs.map(function(d){
              var doc = docs[d[0]];
              var tiene = doc && doc.archivoId;
              var venc = doc && doc.vencimiento ? ' · Vence: '+doc.vencimiento : '';
              if(tiene){
                return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:0.5px solid #f0f1f4">'
                  +'<div style="font-size:13px;color:#1e2d4e">'+d[1]+'<span style="font-size:11px;color:#9CA3AF">'+venc+'</span></div>'
                  +'<button onclick="descargar(\''+doc.archivoId+'\',\''+(doc.archivoNombre||d[1])+'\')" style="background:#1e2d4e;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0">Descargar</button>'
                  +'</div>';
              } else {
                return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:0.5px solid #f0f1f4">'
                  +'<div style="font-size:13px;color:#9CA3AF">'+d[1]+'</div>'
                  +'<span style="font-size:11px;color:#EF4444;flex-shrink:0">Sin subir</span>'
                  +'</div>';
              }
            }).join('');
            return '<div class="equipo-item" style="padding:0;overflow:hidden">'
              +'<div onclick="toggleEquipoAdmin(this)" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;cursor:pointer">'
              +'<div style="flex:1;min-width:0">'
              +'<div class="equipo-tipo">'+(e.tipo||'Equipo')+(e.marca?' · '+e.marca:'')+(e.modelo?' '+e.modelo:'')+(e.ano?' ('+e.ano+')':'')+'</div>'
              +'<div class="equipo-meta">'+(e.patente?'Patente: '+e.patente+(specs.length?' · ':''):'')+specs.join(' · ')+'</div>'
              +'</div>'
              +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
              +'<span style="font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;background:'+pillBg+';color:'+pillColor+'">'+subidos+'/'+reqDocs.length+' docs</span>'
              +'<span class="eq-chevron" style="color:#9CA3AF;transition:transform .2s">▾</span>'
              +'</div>'
              +'</div>'
              +'<div class="eq-docs" style="display:none;padding:0 14px 12px"><div style="font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin:6px 0 4px">Documentación</div>'+docsHtml
              +(e.descripcion?'<div style="font-size:12px;color:#6B7280;margin-top:8px">'+e.descripcion+'</div>':'')
              +'</div>'
              +'</div>';
          }).join('');
      equiposHtml = '<div class="card"><div class="card-hdr">Equipos registrados</div><div class="card-body">' + equiposInner + '</div></div>';
    }

    // ── Operación (solo transportista): zonas, tipos de equipo, años exp ──
    var operacionHtml = '';
    if (isTransportista) {
      var zonas = Array.isArray(u.zonas) ? u.zonas : [];
      var tipos = Array.isArray(u.tiposEquipo) ? u.tiposEquipo : [];
      operacionHtml = '<div class="card"><div class="card-hdr">Operación</div><div class="card-body">' +
        '<div class="info-grid" style="margin-top:0">' +
          '<div class="info-item"><div class="info-label">Zonas de cobertura</div><div class="info-val">' + (zonas.length ? zonas.join(', ') : '--') + '</div></div>' +
          '<div class="info-item"><div class="info-label">Años de experiencia</div><div class="info-val">' + (u.anosExperiencia || '--') + '</div></div>' +
        '</div>' +
        '<div style="margin-top:14px"><div class="info-label">Tipos de equipo que opera</div>' +
          '<div class="info-val" style="margin-top:4px;line-height:1.6">' + (tipos.length ? tipos.join(', ') : '--') + '</div></div>' +
        (u.descripcion ? '<div style="margin-top:14px"><div class="info-label">Descripción</div><div class="info-val" style="margin-top:4px;line-height:1.6">' + u.descripcion + '</div></div>' : '') +
        '</div></div>';
    } else if (u.descripcion) {
      operacionHtml = '<div class="card"><div class="card-hdr">Descripción</div><div class="card-body"><div class="info-val" style="line-height:1.6">' + u.descripcion + '</div></div></div>';
    }

    // ── Datos de facturación ──
    var facturacionHtml = '';
    var f = u.facturacion || {};
    if (f.razonSocial || f.rut || f.giro || f.direccion || f.email || f.contactoNombre) {
      facturacionHtml = '<div class="card"><div class="card-hdr">Datos de facturación</div><div class="card-body"><div class="info-grid" style="margin-top:0">' +
        '<div class="info-item"><div class="info-label">Razón social</div><div class="info-val">' + (f.razonSocial || '--') + '</div></div>' +
        '<div class="info-item"><div class="info-label">RUT</div><div class="info-val">' + (f.rut || '--') + '</div></div>' +
        '<div class="info-item"><div class="info-label">Giro</div><div class="info-val">' + (f.giro || '--') + '</div></div>' +
        '<div class="info-item"><div class="info-label">Dirección</div><div class="info-val">' + (f.direccion || '--') + '</div></div>' +
        '<div class="info-item"><div class="info-label">Email facturación</div><div class="info-val">' + (f.email || '--') + '</div></div>' +
        (f.contactoNombre ? '<div class="info-item"><div class="info-label">Contacto</div><div class="info-val">' + f.contactoNombre + '</div></div>' : '') +
        '</div></div></div>';
    }

    // ── Contactos operacionales (operaciones, comercial, facturación) ──
    var contactosHtml = '';
    var cOp = u.contactoOperaciones, cCom = u.contactoComercial, cFac = u.contactoFacturacion;
    var renderContacto = function(titulo, c){
      if(!c || (!c.nombre && !c.email && !c.telefono)) return '';
      return '<div style="margin-bottom:14px"><div class="info-label" style="margin-bottom:4px">' + titulo + '</div>' +
        '<div class="info-val" style="line-height:1.6">' +
        (c.nombre ? c.nombre : '') + (c.cargo ? ' · ' + c.cargo : '') +
        (c.telefono ? '<br>' + c.telefono : '') +
        (c.email ? '<br>' + c.email : '') +
        '</div></div>';
    };
    var contactosInner = renderContacto('Operaciones', cOp) + renderContacto('Comercial', cCom) + renderContacto('Facturación', cFac);
    if (contactosInner) {
      contactosHtml = '<div class="card"><div class="card-hdr">Contactos de la empresa</div><div class="card-body">' + contactosInner + '</div></div>';
    }

    // ── Métricas de cuenta ──

        '<button onclick="guardarMaxUsuarios()" style="background:#1e2d4e;color:#fff;padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Guardar</button>' +

        '<div style="font-size:12px;color:#9CA3AF;margin-top:8px">' + subusuarios.length + ' sub-usuario(s) en la empresa · cupo: ' + (u.max_usuarios || 0) + '</div>' +

    }

    // Sección plan solo para clientes (los transportistas no tienen plan)
    var planHtml = '';
    if (!isTransportista) {
      planHtml = '<div class="card"><div class="card-hdr">Plan activo</div><div class="card-body">' +
        '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
          '<select id="sel-plan" class="plan-select">' +
            '<option value="basico"' + (u.plan === 'basico' ? ' selected' : '') + '>Básico (1 UF/mes)</option>' +
            '<option value="pro"' + (u.plan === 'pro' ? ' selected' : '') + '>Pro (2 UF/mes)</option>' +

      '</div></div>';
    }

    var html =
      // ── Header ──
      '<div class="card"><div class="card-body">' +
        '<div class="perfil-hdr">' +
          '<div class="perfil-avatar">' + initials + '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div class="perfil-nombre">' + (u.empresa || u.nombre) + '</div>' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">' +
              '<div class="perfil-email">' + u.email + '</div>' +
              '<a href="mailto:' + u.email + '" style="font-size:11px;color:#1d4ed8;text-decoration:underline">Enviar email</a>' +

        '<div class="sep"></div>' +

        // ── Empresa ──
        '<div style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Empresa' +
          (u.esSubusuario ? ' <span style="font-size:11px;font-weight:500;color:#9CA3AF;text-transform:none;letter-spacing:0">(heredado de la cuenta madre)</span>' : '') +

        '<div class="info-grid" style="margin-top:0">' +

          '<div class="info-item"><div class="info-label">Giro</div><div class="info-val">' + (u.giro || '--') + '</div></div>' +

          '<div class="info-item"><div class="info-label">Ciudad</div><div class="info-val">' + (u.ciudadEmpresa || u.ciudad || '--') + '</div></div>' +
          '<div class="info-item"><div class="info-label">Teléfono empresa</div><div class="info-val">' + (u.telEmpresa || u.telefono || '--') + '</div></div>' +

        '<div class="info-grid" style="margin-top:0">' +

      // ── Notas internas ──
      '<div class="card"><div class="card-hdr">Notas internas</div><div class="card-body">' +

        '<div style="display:flex;justify-content:flex-end;margin-top:12px">' +
          '<button onclick="guardarNotas()" style="background:#1e2d4e;color:#fff;padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Guardar notas</button>' +

  function renderEstado(estado) {
    // Banner
    var banner = document.getElementById('estado-banner');
    var botones = document.getElementById('estado-botones');
    if (!banner || !botones) return;

    var cfg = {
      activo:    { bg:'#F0FDF4', border:'#BBF7D0', color:'#14532D', label:'Cuenta activa' },
      pendiente: { bg:'#FFFBEB', border:'#FDE68A', color:'#92400E', label:'Pendiente de aprobación' },
      suspendido:{ bg:'#FEF2F2', border:'#FECACA', color:'#991B1B', label:'Cuenta suspendida' },
      rechazado: { bg:'#FEF2F2', border:'#FECACA', color:'#991B1B', label:'Cuenta rechazada' },
    };
    var c = cfg[estado] || { bg:'#F9FAFB', border:'#E5E7EB', color:'#6B7280', label: estado };
    banner.style.background = c.bg;
    banner.style.border = '1px solid ' + c.border;
    banner.style.color = c.color;
    banner.innerHTML = 'Estado actual: <strong>' + c.label + '</strong>';

    // Botones
    if (estado === 'pendiente') {
      // Cuenta pendiente → Aprobar (azul marino) + Rechazar (naranja outline)
      botones.innerHTML =
        '<button onclick="cambiarEstado(\'activo\')" style="background:#1e2d4e;color:#fff;padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Aprobar cuenta</button>' +
        '<button onclick="cambiarEstado(\'rechazado\')" style="background:#fff;color:#FF8808;border:1.5px solid #FF8808;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Rechazar</button>';
    } else if (estado === 'suspendido' || estado === 'rechazado') {
      // Cuenta suspendida/rechazada → Reactivar (azul) + Eliminar
      botones.innerHTML =
        '<button onclick="cambiarEstado(\'activo\')" style="background:#1e2d4e;color:#fff;padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Reactivar cuenta</button>' +
        '<button onclick="confirmarEliminar()" style="background:#fff;color:#EF4444;border:1.5px solid #FECACA;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Eliminar cuenta</button>';
    } else {
      // Cuenta activa → Suspender (naranja outline) + Eliminar
      botones.innerHTML =
        '<button onclick="cambiarEstado(\'suspendido\')" style="background:#fff;color:#FF8808;border:1.5px solid #FF8808;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Suspender cuenta</button>' +
        '<button onclick="confirmarEliminar()" style="background:#fff;color:#EF4444;border:1.5px solid #FECACA;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Eliminar cuenta</button>';
    }
  }

  function toggleEquipoAdmin(head){
    var item = head.parentNode;
    var docs = item.querySelector('.eq-docs');
    var chev = head.querySelector('.eq-chevron');
    if(!docs) return;
    var abierto = docs.style.display==='block';
    docs.style.display = abierto ? 'none' : 'block';
    if(chev) chev.style.transform = abierto ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  async function descargar(id, nombre){
    try{
      const r = await api('/api/archivos/'+id);
      if(!r||!r.ok){ toast('Error al descargar','err'); return; }
      const b64 = r.data.base64, mime = r.data.mimeType, n = r.data.nombre;
      const arr = new Uint8Array(atob(b64).split('').map(function(c){return c.charCodeAt(0);}));
      const blob = new Blob([arr],{type:mime||'application/octet-stream'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nombre||n||'archivo'; a.click();
      URL.revokeObjectURL(url);
    }catch(e){ toast('Error al descargar','err'); }
  }

  async function cambiarEstado(estado) {
    var r;
    // Aprobar/rechazar un transportista pendiente usa el endpoint que envía email + notificación de aprobación
    if (userData.role === 'transportista' && userData.estado === 'pendiente' && (estado === 'activo' || estado === 'rechazado')) {
      r = await api('/api/admin/aprobar-transportista', 'POST', { email: userData.email, accion: estado === 'activo' ? 'aprobar' : 'rechazar' });
    } else {
      r = await api('/api/admin/gestionar-usuario', 'POST', { email: userData.email, estado: estado });
    }
    if (r && r.ok) {
      userData.estado = estado;
      renderEstado(estado);
      toast('Estado actualizado');
    } else {
      toast('Error al actualizar', 'err');
    }
  }

  async function cambiarPlan() {
    var plan = document.getElementById('sel-plan').value;
    var r = await api('/api/admin/gestionar-usuario', 'POST', { email: userData.email, plan: plan });
    if (r && r.ok) {
      userData.plan = plan;
      toast('Plan actualizado a: ' + plan);
    } else {
      toast('Error al actualizar', 'err');
    }
  }

  async function guardarMaxUsuarios() {
    var inp = document.getElementById('inp-max-usuarios');
    var max = parseInt(inp.value) || 0;
    var r = await api('/api/admin/gestionar-usuario', 'POST', { email: userData.email, max_usuarios: max });
    if (r && r.ok) {
      userData.max_usuarios = max;
      inp.value = max;
      toast('Guardado: ' + max + ' usuario(s) extra');
    } else {
      toast('Error al guardar', 'err');
    }
  }

  async function toggleSubusuario(email, activar) {
    var r = await api('/api/admin/subusuario-activacion', 'POST', { email: email, activo: activar });
    if (r && r.ok) {
      toast(activar ? 'Sub-usuario activado' : 'Sub-usuario desactivado');
      cargar();
    } else {
      toast('Error al actualizar', 'err');
    }
  }

  async function guardarNotas() {
    var notas = document.getElementById('notas-admin').value;
    var r = await api('/api/admin/gestionar-usuario', 'POST', { email: userData.email, notasAdmin: notas });
    if (r && r.ok) toast('Notas guardadas');
    else toast('Error al guardar', 'err');
  }

  async function confirmarEliminar() {
    if (confirm('¿Eliminar la cuenta de ' + userData.email + '? Esta acción no se puede deshacer.')) {
      var res = await fetch(API + '/api/admin/usuario/' + encodeURIComponent(userData.email), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('tm_token') }
      });
      var d = await res.json();
      if (res.ok) {
        toast('Usuario eliminado');
        setTimeout(function() { window.location.href = '/admin-clientes.html'; }, 1500);
      } else {
        toast(d.error || 'Error al eliminar', 'err');
      }
    }
  }

  async function cargarHistorial(email, isTransportista) {
    var r = await api('/api/licitaciones');
    var el = document.getElementById('historial-body');
    if (!r || !r.ok) { el.innerHTML = '<div class="empty">Sin datos</div>'; return; }
    var licit = r.data.licitaciones || [];
    var propias = isTransportista
      ? licit.filter(function(l) { return (l.cotizaciones || []).some(function(c) { return c.transportistaEmail === email; }) || (l.adjudicadaA && l.adjudicadaA.transportistaEmail === email); })
      : licit.filter(function(l) { return l.clienteEmail === email; });
    if (propias.length === 0) { el.innerHTML = '<div class="empty">Sin actividad registrada</div>'; return; }
    var colores = { pendiente_admin:'#FF8808', abierta:'#FF8808', cerrada:'#1e2d4e', adjudicada:'#1d4ed8', completada:'#1ED24E', rechazada:'#EF4444' };
    el.innerHTML = propias.slice(0, 10).map(function(l) {
      return '<div class="licit-row">' +
        '<div style="width:8px;height:8px;border-radius:50%;background:' + (colores[l.estado] || '#9CA3AF') + ';flex-shrink:0"></div>' +
        '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:#1e2d4e">' + l.tipoEquipo + (l.marca ? ' — ' + l.marca : '') + '</div>' +
        '<div style="font-size:11px;color:#6B7280">' + l.origen + ' → ' + l.destino + '</div></div>' +
        '<span style="font-size:11px;font-weight:500;color:' + (colores[l.estado] || '#9CA3AF') + '">' + l.estado + '</span>' +
        '</div>';
    }).join('');
  }

  // Auth guard
  (function() {
    var token = localStorage.getItem('tm_token');
    var role = localStorage.getItem('tm_role');
    if (!token || role !== 'admin') { window.location.replace('/admin-login.html'); return; }
    document.getElementById('auth-guard').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargar();
  })();
</script>
