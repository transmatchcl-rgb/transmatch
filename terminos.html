<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>TransMatch — Términos y Condiciones</title><style>
 *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#374151}
 .nav{background:#1e2d4e;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
 .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
 .nav-icon{background:#ff8904;border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px}
 .nav-name{font-weight:700;color:#fff;font-size:15px}
 .nav-name span{color:#ff8904}
 .nav-back{font-size:13px;color:#93C5FD;text-decoration:none;padding:6px 12px;border-radius:6px}
 .nav-back:hover{color:#fff;background:rgba(255,255,255,.1)}
 main{max-width:900px;margin:0 auto;padding:40px 24px 60px}
 .doc-header{margin-bottom:24px}
 .doc-badge{display:inline-block;background:#eef1f8;color:#1e2d4e;font-size:11px;font-weight:700;padding:3px 12px;border-radius:999px;margin-bottom:12px}
 h1{font-size:28px;font-weight:700;color:#1e2d4e;margin-bottom:8px}
 .doc-meta{font-size:13px;color:#9CA3AF}
 .tabs{display:flex;gap:6px;border-bottom:2px solid #e8eaf0;margin-bottom:20px}
 .tab{padding:11px 22px;font-size:14px;font-weight:600;color:#6B7280;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s}
 .tab:hover{color:#1e2d4e}
 .tab.active{color:#1e2d4e;border-bottom-color:#ff8904}
 .pane{display:none}
 .pane.active{display:block}
 .pdf-actions{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#f8f9fc;border:1px solid #e8eaf0;border-radius:10px;padding:14px 18px;margin-bottom:16px}
 .pdf-actions .label{font-size:13px;color:#6B7280}
 .pdf-actions .label strong{color:#1e2d4e}
 .btn-pdf{display:inline-flex;align-items:center;gap:7px;background:#1e2d4e;color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;white-space:nowrap}
 .btn-pdf:hover{background:#2a3d63}
 .pdf-frame{width:100%;height:78vh;min-height:500px;border:1px solid #e8eaf0;border-radius:10px;background:#f8f9fc}
 @media(max-width:600px){
   main{padding:24px 14px 48px}
   h1{font-size:22px}
   .tab{padding:10px 16px;font-size:13px}
   .pdf-frame{height:70vh;min-height:420px}
   body{overflow-x:hidden}
 }
</style></head><body>
<nav class="nav"><a href="/landing.html" class="nav-logo"><div class="nav-icon">T</div><span class="nav-name">Trans<span>Match</span></span></a><a href="javascript:history.back()" class="nav-back">← Volver</a></nav>
<main>
  <div class="doc-header">
    <div class="doc-badge">LEGAL</div>
    <h1>Términos y Condiciones de Uso</h1>
    <div class="doc-meta">Versión 1.0 · Junio de 2026 · TransMatch SpA · RUT: 78.419.036-6</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-cliente" onclick="mostrarTab('cliente')">Cliente</button>
    <button class="tab" id="tab-transportista" onclick="mostrarTab('transportista')">Transportista</button>
  </div>

  <div class="pane active" id="pane-cliente">
    <div class="pdf-actions">
      <div class="label">Términos y Condiciones para <strong>Clientes</strong> de TransMatch.</div>
      <a class="btn-pdf" href="/Terminos_y_Condiciones_Cliente.pdf" target="_blank" rel="noopener">Abrir / descargar PDF</a>
    </div>
    <iframe class="pdf-frame" id="frame-cliente" src="/Terminos_y_Condiciones_Cliente.pdf#view=FitH" title="Términos y Condiciones Cliente"></iframe>
  </div>

  <div class="pane" id="pane-transportista">
    <div class="pdf-actions">
      <div class="label">Términos y Condiciones para <strong>Transportistas</strong> de TransMatch.</div>
      <a class="btn-pdf" href="/Terminos_y_Condiciones_Transportista.pdf" target="_blank" rel="noopener">Abrir / descargar PDF</a>
    </div>
    <iframe class="pdf-frame" id="frame-transportista" title="Términos y Condiciones Transportista"></iframe>
  </div>
</main>

<script>
  function mostrarTab(rol){
    document.getElementById('tab-cliente').classList.toggle('active', rol==='cliente');
    document.getElementById('tab-transportista').classList.toggle('active', rol==='transportista');
    document.getElementById('pane-cliente').classList.toggle('active', rol==='cliente');
    document.getElementById('pane-transportista').classList.toggle('active', rol==='transportista');
    // Cargar el iframe del transportista solo al abrir su pestaña (lazy)
    if(rol==='transportista'){
      var f=document.getElementById('frame-transportista');
      if(!f.src) f.src='/Terminos_y_Condiciones_Transportista.pdf#view=FitH';
    }
    if(history.replaceState) history.replaceState(null,'', '#'+rol);
  }
  // Abrir en la pestaña indicada por el hash (#transportista) o por ?rol=
  (function(){
    var hash=(location.hash||'').replace('#','').toLowerCase();
    var qp=new URLSearchParams(location.search).get('rol');
    var rol=(hash==='transportista'||qp==='transportista')?'transportista':'cliente';
    mostrarTab(rol);
  })();
</script>
</body></html>
