<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">

<style>
 :root{
   --navy:#1E2D4E; --navy-hover:#2A3D63; --navy-deep:#131A2C;
   --orange:#FF8808; --orange-hover:#E0770A; --orange-deep:#C96A05;
   --font-display:'Barlow Condensed',sans-serif;
   --font-body:'Barlow',sans-serif;
   --font-logo:'Montserrat',sans-serif;
 }
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 font-family: var(--font-body);
 background: var(--navy); min-height: 100vh;
 display: flex; align-items: center; justify-content: center; padding: 20px;
 }
 .card {
 background: #fff; border-radius: 16px; padding: 36px;
 width: 100%; max-width: 380px;
 box-shadow: 0 20px 60px rgba(0,0,0,.25);
 }
 .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
 .logo-icon { background: var(--orange); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; font-family: var(--font-logo); color: #fff; }
 .logo-name { font-size: 20px; font-weight: 800; font-family: var(--font-logo); color: var(--navy); }
 .logo-name span { color: var(--orange); }
 .badge { background: var(--navy); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-left: 6px; letter-spacing: .06em; }
 h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 4px; text-align: center; }
 p { font-size: 13px; color: #6B7280; text-align: center; margin-bottom: 24px; }
 .form-group { margin-bottom: 16px; }
 label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
 input {
 width: 100%; padding: 11px 14px; border: 1px solid #E5E7EB;
 border-radius: 8px; font-size: 14px; color: #111827; font-family: var(--font-body);
 transition: border-color .15s;
 }
 input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(30,45,78,.1); }
 .btn {
 width: 100%; padding: 12px; border-radius: 8px; font-size: 15px;
 font-family: var(--font-body);
 font-weight: 600; cursor: pointer; border: none;
 background: var(--navy); color: #fff; margin-top: 6px;
 transition: opacity .15s;
 }
 .btn:hover:not(:disabled) { opacity: .88; }
 .btn:disabled { opacity: .6; cursor: not-allowed; }
 .alert {
 padding: 10px 14px; border-radius: 8px; font-size: 13px;
 margin-bottom: 16px; display: none; text-align: center;
 }
 .alert-err { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
 .spinner {
 display: inline-block; width: 16px; height: 16px;
 border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
 border-radius: 50%; animation: spin .6s linear infinite;
 vertical-align: middle; margin-right: 6px;
 }
 @keyframes spin { to { transform: rotate(360deg); } }
 .back { text-align: center; margin-top: 20px; font-size: 13px; }
 .back a { color: #9CA3AF; text-decoration: none; }
 .back a:hover { color: var(--navy); }
 .brand-logo{height:34px;width:auto;display:block}

</svg><span class="badge">ADMIN</span></div><h2>Panel de administración</h2><p>Acceso exclusivo para administradores</p><div id="alert" class="alert alert-err"></div><div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="admin@transmatch.cl" autocomplete="username"/></div><div class="form-group"><label for="password">Contraseña</label><div style="position:relative"><input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px"/><button type="button" onclick="togglePwd()" title="Mostrar/ocultar" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#9CA3AF;display:flex;align-items:center"><svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div><button class="btn" id="btn" onclick="login()">Entrar al panel</button><div class="back"><a href="/index.html">← Volver al inicio</a></div></div><script>
 const API = 'https://transmatch.transmatchcl.workers.dev';
 function showErr(msg) {
 const el = document.getElementById('alert');
 el.textContent = msg;
 el.style.display = 'block';
 }
 function setLoading(on) {
 const btn = document.getElementById('btn');
 btn.disabled = on;
 btn.innerHTML = on ? '<span class="spinner"></span>Verificando...' : 'Entrar al panel';
 }
 async function login() {
 const email = document.getElementById('email').value.trim();
 const password = document.getElementById('password').value;
 document.getElementById('alert').style.display = 'none';
 if (!email || !password) { showErr('Completa los dos campos'); return; }
 setLoading(true);
 try {
 const res = await fetch(API + '/api/auth/login', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ email, password })
 });
 const data = await res.json();
 if (!res.ok) { showErr(data.error || 'Credenciales incorrectas'); return; }
 if (data.role !== 'admin') { showErr('Esta cuenta no tiene permisos de administrador'); return; }
 localStorage.setItem('tm_token', data.token);
 localStorage.setItem('tm_role', 'admin');
 localStorage.setItem('tm_nombre', data.nombre || 'Administrador');
 localStorage.setItem('tm_empresa', 'TransMatch');
 localStorage.setItem('tm_plan', '');
 window.location.replace('/admin.html');
 } catch(e) {
 showErr('Error de conexión. Verifica tu internet e intenta nuevamente.');
 } finally {
 setLoading(false);
 }
 }
 function togglePwd(){
   var inp = document.getElementById('password');
   var icon = document.getElementById('eye-icon');
   if(inp.type==='password'){
     inp.type='text';
     icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
   } else {
     inp.type='password';
     icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
   }
 }
document.addEventListener('keydown', e => {
 if (e.key === 'Enter') login();
 });
</script></body></html>
